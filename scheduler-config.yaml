apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: false
clientConnection:
  kubeconfig: "/root/.kube/config"
profiles:
  - schedulerName: inference-scheduler
    plugins:
      preFilter:
        enabled:
          - name: InferenceGangScheduler
      reserve:
        enabled:
          - name: InferenceGangScheduler
      permit:
        enabled:
          - name: InferenceGangScheduler
      postBind:
        enabled:
          - name: InferenceGangScheduler
